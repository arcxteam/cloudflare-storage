<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Supercharger Private Storage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="icon" href="/src/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="noiseCanvas"></canvas>
    <div class="container">
        <div class="login-wrapper">
            <div class="login-card">
                <div class="login-header">
                    <div class="login-logo">
                        <img src="/src/logo.png" alt="Logo" class="login-logo-img" onerror="this.style.display='none'">
                        <div class="login-shield">
                            <i class="fas fa-shield-halved"></i>
                        </div>
                    </div>
                    <h1 class="login-title">Admin Dashboard</h1>
                    <p class="login-subtitle">Supercharger Private Storage by Cloudflare R2</p>
                    <div class="login-security-badge">
                        <i class="fas fa-lock"></i>
                        <span>Secured Access</span>
                    </div>
                </div>
                
                <div class="login-body">
                    <form id="loginForm" autocomplete="off">
                        <div class="login-input-group">
                            <div class="login-input-wrapper">
                                <i class="fas fa-key login-input-icon"></i>
                                <input 
                                    type="password" 
                                    class="form-control login-input" 
                                    id="passwordInput" 
                                    placeholder="Enter admin password"
                                    required
                                    autocomplete="off"
                                    spellcheck="false"
                                >
                                <button type="button" class="login-toggle-pass" id="togglePassword">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        
                        <div class="login-error" id="loginError" style="display: none;">
                            <i class="fas fa-exclamation-triangle"></i>
                            <span id="loginErrorText">Invalid credentials</span>
                        </div>
                        
                        <button type="submit" class="btn btn-generate login-btn" id="loginButton">
                            <i class="fas fa-right-to-bracket me-2"></i>Access Dashboard
                        </button>
                    </form>
                </div>

                <div class="login-footer">
                    <div class="login-footer-info">
                        <i class="fas fa-info-circle"></i>
                        <span>This is a private storage system. Unauthorized access is prohibited.</span>
                    </div>
                </div>
            </div>
            
            <div class="footer">
                &copy; <span id="currentYear"></span> Greyscope&Co. All rights reserved.
            </div>
        </div>
    </div>

    <script>
    (function() {
        var canvas = document.getElementById('noiseCanvas');
        if (!canvas) return;
        var ctx = canvas.getContext('2d');
        var render = function() {
            var dpr = Math.min(window.devicePixelRatio || 1, 2);
            var w = window.innerWidth;
            var h = window.innerHeight;
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            var imageData = ctx.createImageData(canvas.width, canvas.height);
            var data = imageData.data;
            for (var y = 0; y < canvas.height; y++) {
                for (var x = 0; x < canvas.width; x++) {
                    if (Math.random() > 0.35) continue;
                    var i = (y * canvas.width + x) * 4;
                    var noise = Math.random() * 28;
                    data[i] = noise * 0.7;
                    data[i + 1] = noise * 1.1;
                    data[i + 2] = noise * 0.9;
                    data[i + 3] = 18 + Math.random() * 22;
                }
            }
            ctx.putImageData(imageData, 0, 0);
        };
        render();
        window.addEventListener('resize', render);
    })();
    </script>
    <script>
    (function() {
        'use strict';
        
        document.getElementById('currentYear').textContent = new Date().getFullYear();
        
        var loginForm = document.getElementById('loginForm');
        var passwordInput = document.getElementById('passwordInput');
        var loginButton = document.getElementById('loginButton');
        var loginError = document.getElementById('loginError');
        var loginErrorText = document.getElementById('loginErrorText');
        var togglePassword = document.getElementById('togglePassword');
        
        // Toggle password visibility
        togglePassword.addEventListener('click', function() {
            var type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            var icon = this.querySelector('i');
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        });
        
        // Focus password input on load
        setTimeout(function() { passwordInput.focus(); }, 300);
        
        // Handle login
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            var password = passwordInput.value;
            if (!password) return;
            
            // Disable button
            loginButton.disabled = true;
            loginButton.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Authenticating...';
            loginError.style.display = 'none';
            
            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/auth/login', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.withCredentials = true;
            
            xhr.onload = function() {
                if (xhr.status === 200) {
                    loginButton.innerHTML = '<i class="fas fa-check me-2"></i>Access Granted';
                    loginButton.classList.add('login-success');
                    // Redirect to dashboard
                    setTimeout(function() {
                        window.location.href = '/';
                    }, 500);
                } else {
                    var errorMsg = 'Invalid credentials';
                    try {
                        var resp = JSON.parse(xhr.responseText);
                        errorMsg = resp.error || errorMsg;
                    } catch(ex) {}
                    
                    loginErrorText.textContent = errorMsg;
                    loginError.style.display = 'flex';
                    loginButton.disabled = false;
                    loginButton.innerHTML = '<i class="fas fa-right-to-bracket me-2"></i>Access Dashboard';
                    
                    // Shake animation
                    var card = document.querySelector('.login-card');
                    card.classList.add('shake');
                    setTimeout(function() { card.classList.remove('shake'); }, 600);
                    
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            };
            
            xhr.onerror = function() {
                loginErrorText.textContent = 'Network error. Please check your connection.';
                loginError.style.display = 'flex';
                loginButton.disabled = false;
                loginButton.innerHTML = '<i class="fas fa-right-to-bracket me-2"></i>Access Dashboard';
            };
            
            xhr.send(JSON.stringify({password: password}));
        });
        
        // Prevent right-click context menu on login page
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        
    })();
    </script>
</body>
</html>
